name: Generate PR Description

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  copilot-requests: write   # GITHUB_TOKEN認証に必要

jobs:
  generate-description:
    runs-on: ubuntu-latest
    # フォークからのPRでは実行しない（セキュリティ対策）
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0   # ベースブランチとの差分取得に必要

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate PR description with Copilot CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          copilot -p "/pr-description スキルを使って、このPRの説明文を作成し /tmp/pr-body.md に書き出してください。ベースブランチは $BASE_REF です。" \
            -s \
            --allow-tool='shell(git:*), read, write' \
            --no-ask-user

      - name: Update PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/pr-body.md